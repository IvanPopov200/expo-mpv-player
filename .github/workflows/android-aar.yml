name: Build LGPL libmpv AAR

# Heavy native build (tens of minutes). Kept separate from PR CI: run on demand
# or on a schedule, verify LGPL from build output, and publish the AAR + the G1
# evidence (FFmpeg config.h, mpv gpl option). PR CI consumes the prebuilt AAR.
#
# Upstream's download.sh installs the SDK/NDK + OS deps on Ubuntu itself, so this
# job stays thin.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: libmpv-android git tag/SHA to build from
        required: false
        default: v1.0.0
      archs:
        description: 'Space-separated upstream archs (empty = all). e.g. "arm64 x86_64"'
        required: false
        default: ""
  schedule:
    - cron: "0 6 1 * *" # monthly, to catch upstream/security updates

jobs:
  build-aar:
    name: Build & verify LGPL AAR
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm yasm pkg-config autoconf automake libtool gperf
          # apt meson is too old (fontconfig/libplacebo need >= 1.6.1); use pipx.
          pipx install meson || python3 -m pip install --user --break-system-packages meson
          meson --version && ninja --version && nasm --version | head -1

      - name: Build LGPL AAR (upstream download.sh installs SDK/NDK + deps)
        env:
          LIBMPV_ANDROID_REF: ${{ github.event.inputs.ref || 'v1.0.0' }}
          ARCHS: ${{ github.event.inputs.archs || '' }}
        run: |
          chmod +x android/libmpv-build/*.sh
          ./android/libmpv-build/build-lgpl-aar.sh --ref "$LIBMPV_ANDROID_REF" --archs "$ARCHS"

      - name: Verify LGPL (fail-closed) + capture G1 evidence
        if: always()
        run: |
          ./android/libmpv-build/verify-lgpl.sh \
            android/libmpv-build/.work/libmpv-android \
            verification/lgpl | tee verification/lgpl/verify-output.txt

      - name: Upload G1 evidence (config.h / mpv gpl option / verifier output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lgpl-evidence
          path: verification/lgpl/*
          if-no-files-found: warn

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-lgpl-aar
          path: android/libs/*.aar
          if-no-files-found: error
