name: Build LGPL libmpv AAR

# Heavy native build (tens of minutes). Kept separate from PR CI: run on demand
# or on a schedule, verify LGPL, and publish the AAR as an artifact. PR CI then
# consumes the prebuilt AAR rather than rebuilding it.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: libmpv-android git ref to build from
        required: false
        default: master
      abis:
        description: Comma-separated ABIs
        required: false
        default: arm64-v8a,x86_64
  schedule:
    - cron: "0 6 1 * *" # monthly, to catch upstream/security updates

jobs:
  build-aar:
    name: Build & verify LGPL AAR
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK + build tools
        run: |
          sdkmanager "ndk;29.0.13599879" "cmake;3.31.6" || sdkmanager --list | head
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm yasm pkg-config autoconf libtool

      - name: Build LGPL AAR
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.13599879
          LIBMPV_ANDROID_REF: ${{ github.event.inputs.ref || 'master' }}
          ABIS: ${{ github.event.inputs.abis || 'arm64-v8a,x86_64' }}
        run: |
          chmod +x android/libmpv-build/*.sh
          ./android/libmpv-build/build-lgpl-aar.sh --abis "$ABIS" --ref "$LIBMPV_ANDROID_REF"

      - name: Verify LGPL
        run: ./android/libmpv-build/verify-lgpl.sh android/libmpv-build/.work/libmpv-android

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-lgpl-aar
          path: android/libs/*.aar
          if-no-files-found: error
